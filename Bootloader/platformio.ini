; IEC 62386-105 DALI Bootloader for CH32V003 (1920-byte boot area)
;
; Build orchestration via PlatformIO; functional equivalent of build.bat.
; No PIO framework is set — that triggers the platform's bare-metal
; auto-load (frameworks/_bare.py) which provides the right toolchain flags
; without dragging in framework-ch32v003fun's ch32fun.c runtime (which
; would not fit in the 1920-byte boot area and would conflict with our
; minimal startup.S).
;
; The vendored ch32v003fun/ subdirectory supplies the register-define
; header used by dali_bootloader.c (`#include "ch32v003fun.h"`). The
; vendored libgcc.a is linked explicitly via trim_link_flags.py to
; match the original build.bat link line.

[env:dali_bootloader]
platform = ch32v
board = genericCH32V003F4P6

; --- Memory layout -------------------------------------------------------
; bootloader.ld places .text at 0x00000000 (hardware-mapped to 0x1FFFF000
; on the CH32V003 boot area). The 1920-byte limit is checked at link time
; via the LENGTH=1920 in the script; PIO's maximum_size triggers an
; additional warning if we exceed it.
board_build.ldscript = src/bootloader.ld
board_upload.maximum_size = 1920

; --- Compile flags -------------------------------------------------------
; _bare.py already sets: -Os -g -Wall -ffunction-sections -fdata-sections
;                       -fno-common -msave-restore -msmall-data-limit=0
;                       -march=rv32ec -mabi=ilp32e -Wl,-gc-sections
;                       --specs=nano.specs --specs=nosys.specs -nostartfiles
; We override what differs vs. build.bat and add what's missing.
; PIO auto-adds src/ and include/ to the include path, so funconfig.h
; (now in include/) is found without an explicit -I.
build_flags =
    -flto
    -fno-builtin
    -nostdlib
    -static-libgcc
    -fmessage-length=0
    -Ich32v003fun

build_unflags =
    -O0
    -O1
    -O2
    -O3
    -Og
    --specs=nano.specs
    --specs=nosys.specs

extra_scripts = post:trim_link_flags.py

; --- Upload --------------------------------------------------------------
; NOTE: PIO's stock wch-link upload writes to the application area
; (0x08000000), not the boot area (0x1FFFF000). For the BL, continue
; using flash.bat / wchisp manually until a proper upload override is
; wired up. `pio run` (build-only) is the supported entry point here.
upload_protocol = wch-link
